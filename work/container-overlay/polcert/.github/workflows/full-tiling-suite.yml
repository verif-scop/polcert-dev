name: full-tiling-suite

on:
  push:
    branches:
      - main
      - extractor
  pull_request:

jobs:
  polopt-loop-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Load Pluto baseline
        run: >-
          grep -v '^[[:space:]]*#' tools/ci/pluto-baseline.env |
          grep -v '^[[:space:]]*$' >> "$GITHUB_ENV"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build suite image from the repository Dockerfile
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: polcert-tiling-ci:gha
          build-args: |
            PLUTO_IMAGE=${{ env.PLUTO_IMAGE }}
            PLUTO_GIT_REMOTE=${{ env.PLUTO_GIT_REMOTE }}
            PLUTO_GIT_COMMIT=${{ env.PLUTO_GIT_COMMIT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build polopt and run the strict loop suite
        run: >-
          docker run --rm --entrypoint bash polcert-tiling-ci:gha
          -lc 'cd /polcert &&
               eval "$(opam env)" &&
               opam exec -- make depend &&
               opam exec -- make -j1 polopt &&
               opam exec -- make test-iss-pluto-suite &&
               opam exec -- make test-iss-pluto-live-suite &&
               opam exec -- make test-polopt-loop-suite'
